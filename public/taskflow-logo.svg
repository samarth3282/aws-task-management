<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <defs>
    <linearGradient id="topGradient" x1="0%" y1="10%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0E52FF" />
      <stop offset="45%" stop-color="#008BFF" />
      <stop offset="85%" stop-color="#00E5FF" />
      <stop offset="100%" stop-color="#5CFAFF" />
    </linearGradient>

    <linearGradient id="stemGradient" x1="90%" y1="0%" x2="10%" y2="100%">
      <stop offset="0%" stop-color="#01061A" />
      <stop offset="18%" stop-color="#09299E" />
      <stop offset="50%" stop-color="#1454E6" />
      <stop offset="100%" stop-color="#3A82FF" />
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="800" height="800" fill="#04091A" />

  <!-- Stem (Background Fold) -->
  <path d="M 380 292 
           L 280 552 
           C 280 607, 390 607, 390 552 
           L 490 292 Z" 
        fill="url(#stemGradient)" />

  <!-- Top Bar (Foreground) -->
  <path d="M 300 192 
           L 580 192 
           C 635 192, 555 302, 500 302 
           L 220 302 
           C 165 302, 245 192, 300 192 Z" 
        fill="url(#topGradient)" />
</svg>
